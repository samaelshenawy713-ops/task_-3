<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Page</title>

  <style>
    body{
      background: #eeeeee;
      font-family: Arial, sans-serif;
    }

    .card{
      width: 320px;
      margin: 60px auto;
      background: white;
      padding: 15px;
      text-align: center;
      border-radius: 10px;
    }

    h1{
      color: #4b4b9f;
    }

    .inline{
      display: inline-block;
      width: 45%;
      vertical-align: top;
    }

    img{
      width: 100%;
      border-radius: 8px;
    }

    .btn{
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: #4b4b9f;
      color: white;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <div class="card">

    <h1>Sama Mohammed</h1>
    <p>18 years old</p>

    <h3> I am a student who likes technology and learning new things.</h3>
    <p>BIS student</p>

    <div class="inline">
      <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb">
    </div>

    <div class="inline">
      <p>Paris</p>
    </div>

    <br><br>

    <a href="https://www.google.com" target="_blank">
      link

  <div class="btn">

    Contact 
  </div>

</body>
</html>
